<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Path Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 16px 24px;
  border-bottom: 2px solid #0f3460;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  z-index: 500;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(90deg, #00d2ff, #7b2ff7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-right: auto;
}
.input-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.input-group label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
}
.airport-input {
  background: #0d1b2a;
  border: 2px solid #1b2838;
  color: #fff;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 700;
  width: 120px;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: border-color 0.2s;
}
.airport-input:focus {
  outline: none;
  border-color: #00d2ff;
}
.arrow { font-size: 24px; color: #00d2ff; }
.fly-btn, .mode-btn {
  border: none;
  color: #fff;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fly-btn {
  background: linear-gradient(135deg, #00d2ff 0%, #7b2ff7 100%);
}
.mode-btn {
  background: linear-gradient(135deg, #ff6b35 0%, #f7c948 100%);
  font-size: 13px;
  padding: 10px 16px;
}
.mode-btn.active {
  background: linear-gradient(135deg, #00e676 0%, #00bfa5 100%);
}
.fly-btn:hover, .mode-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0, 210, 255, 0.3);
}
.fly-btn:active, .mode-btn:active { transform: translateY(0); }
#map { flex: 1; background: #0a0a1a; }
.info-bar {
  background: #1a1a2e;
  padding: 12px 24px;
  display: flex;
  gap: 32px;
  align-items: center;
  border-top: 2px solid #0f3460;
  font-size: 14px;
  min-height: 48px;
  flex-wrap: wrap;
}
.info-item { display: flex; align-items: center; gap: 6px; }
.info-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.info-value { color: #00d2ff; font-weight: 700; font-size: 16px; }
.error-msg { color: #ff4757; font-weight: 600; }
.autocomplete-wrapper { position: relative; }
.autocomplete-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #0d1b2a;
  border: 2px solid #1b2838;
  border-top: none;
  border-radius: 0 0 8px 8px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
}
.autocomplete-list.active { display: block; }
.autocomplete-item {
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid #1b2838;
}
.autocomplete-item:hover, .autocomplete-item.selected { background: #16213e; }
.autocomplete-item .code { font-weight: 700; color: #00d2ff; font-size: 15px; margin-right: 8px; }
.autocomplete-item .name { color: #aaa; }
.plane-icon { font-size: 20px; filter: drop-shadow(0 0 6px rgba(0, 210, 255, 0.8)); }

/* PTFS HUD */
.ptfs-hud {
  display: none;
  position: absolute;
  bottom: 60px;
  left: 0;
  right: 0;
  z-index: 800;
  pointer-events: none;
}
.ptfs-hud.active { display: flex; }
.hud-panel {
  background: rgba(10, 10, 26, 0.92);
  border: 2px solid #0f3460;
  border-radius: 12px;
  padding: 16px 20px;
  margin: 0 auto;
  display: flex;
  gap: 24px;
  align-items: center;
  pointer-events: auto;
  backdrop-filter: blur(8px);
}
.hud-gauge {
  text-align: center;
  min-width: 80px;
}
.hud-gauge .gauge-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #888;
  margin-bottom: 4px;
}
.hud-gauge .gauge-value {
  font-size: 24px;
  font-weight: 800;
  font-family: 'Courier New', monospace;
  color: #00ff88;
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
}
.hud-gauge .gauge-unit {
  font-size: 11px;
  color: #666;
  margin-left: 2px;
}
.hud-divider {
  width: 1px;
  height: 50px;
  background: #0f3460;
}
.phase-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.phase-taxi { background: #f7c948; color: #000; }
.phase-takeoff { background: #ff6b35; color: #fff; }
.phase-climb { background: #7b2ff7; color: #fff; }
.phase-cruise { background: #00d2ff; color: #000; }
.phase-descent { background: #e040fb; color: #fff; }
.phase-approach { background: #ff6b35; color: #fff; }
.phase-landed { background: #00e676; color: #000; }

.progress-bar-container {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 800;
  display: none;
  pointer-events: auto;
  background: rgba(10, 10, 26, 0.88);
  border: 2px solid #0f3460;
  border-radius: 10px;
  padding: 10px 20px;
  min-width: 360px;
  backdrop-filter: blur(8px);
}
.progress-bar-container.active { display: block; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}
.progress-label .route-label { color: #00d2ff; font-weight: 700; }
.progress-track {
  height: 8px;
  background: #1b2838;
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00d2ff, #7b2ff7);
  border-radius: 4px;
  transition: width 0.3s;
}
.speed-controls {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  justify-content: center;
}
.speed-btn {
  background: #1b2838;
  border: 1px solid #0f3460;
  color: #888;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  font-weight: 700;
}
.speed-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; }
.speed-btn:hover { border-color: #00d2ff; }
.ptfs-map-layer { opacity: 0.7; }
.ptfs-tooltip {
  background: rgba(10,10,26,0.9) !important;
  border: 1px solid #00d2ff !important;
  color: #00d2ff !important;
  font-weight: 700 !important;
  font-size: 12px !important;
  border-radius: 6px !important;
  padding: 4px 8px !important;
  box-shadow: 0 2px 10px rgba(0,210,255,0.3) !important;
}
.ptfs-tooltip::before { border-top-color: #00d2ff !important; }
</style>
</head>
<body>

<div class="header">
  <h1>Flight Path Tracker</h1>
  <div class="input-group">
    <label>From</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="from" class="airport-input" placeholder="EDI" maxlength="4" autocomplete="off">
      <div class="autocomplete-list" id="from-list"></div>
    </div>
  </div>
  <span class="arrow">&#9992;&#65039;</span>
  <div class="input-group">
    <label>To</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="to" class="airport-input" placeholder="JFK" maxlength="4" autocomplete="off">
      <div class="autocomplete-list" id="to-list"></div>
    </div>
  </div>
  <button class="fly-btn" id="fly-btn">FLY</button>
  <button class="mode-btn" id="mode-btn">PTFS MODE</button>
</div>

<div id="map"></div>

<div class="progress-bar-container" id="progress-bar">
  <div class="progress-label">
    <span class="route-label" id="progress-route">EDI &rarr; JFK</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="speed-controls">
    <button class="speed-btn" data-speed="1">1x</button>
    <button class="speed-btn active" data-speed="5">5x</button>
    <button class="speed-btn" data-speed="20">20x</button>
    <button class="speed-btn" data-speed="50">50x</button>
    <button class="speed-btn" data-speed="100">MAX</button>
  </div>
</div>

<div class="ptfs-hud" id="ptfs-hud">
  <div class="hud-panel">
    <div class="hud-gauge">
      <div class="gauge-label">Speed</div>
      <div class="gauge-value"><span id="hud-speed">0</span><span class="gauge-unit">kts</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Altitude</div>
      <div class="gauge-value"><span id="hud-alt">0</span><span class="gauge-unit">ft</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Heading</div>
      <div class="gauge-value"><span id="hud-hdg">---</span><span class="gauge-unit">&deg;</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">V/S</div>
      <div class="gauge-value"><span id="hud-vs">0</span><span class="gauge-unit">fpm</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Phase</div>
      <div id="hud-phase"><span class="phase-badge phase-taxi">READY</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Remaining</div>
      <div class="gauge-value"><span id="hud-dist">---</span><span class="gauge-unit">nm</span></div>
    </div>
  </div>
</div>

<div class="info-bar" id="info-bar">
  <span style="color:#888">Enter departure and arrival airports, then hit FLY</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function greatCirclePoints(lat1, lon1, lat2, lon2, n = 200) {
  lat1 = toRad(lat1); lon1 = toRad(lon1);
  lat2 = toRad(lat2); lon2 = toRad(lon2);
  const d = 2 * Math.asin(Math.sqrt(
    Math.pow(Math.sin((lat2 - lat1) / 2), 2) +
    Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin((lon2 - lon1) / 2), 2)
  ));
  const points = [];
  for (let i = 0; i <= n; i++) {
    const f = i / n;
    const A = Math.sin((1 - f) * d) / Math.sin(d);
    const B = Math.sin(f * d) / Math.sin(d);
    const x = A * Math.cos(lat1) * Math.cos(lon1) + B * Math.cos(lat2) * Math.cos(lon2);
    const y = A * Math.cos(lat1) * Math.sin(lon1) + B * Math.cos(lat2) * Math.sin(lon2);
    const z = A * Math.sin(lat1) + B * Math.sin(lat2);
    points.push([toDeg(Math.atan2(z, Math.sqrt(x * x + y * y))), toDeg(Math.atan2(y, x))]);
  }
  return points;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function estimateFlightTime(km) {
  const cruiseSpeed = 850;
  const hours = km / cruiseSpeed + 0.5;
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  return `${h}h ${m}m`;
}

function splitAntimeridian(points) {
  const segments = [[]];
  for (let i = 0; i < points.length; i++) {
    segments[segments.length - 1].push(points[i]);
    if (i < points.length - 1 && Math.abs(points[i][1] - points[i + 1][1]) > 180) {
      segments.push([]);
    }
  }
  return segments;
}

function bearing(lat1, lon1, lat2, lon2) {
  lat1 = toRad(lat1); lon1 = toRad(lon1);
  lat2 = toRad(lat2); lon2 = toRad(lon2);
  const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function getFlightPhase(progress) {
  if (progress < 0.02) return { name: 'TAKEOFF', class: 'phase-takeoff' };
  if (progress < 0.12) return { name: 'CLIMB', class: 'phase-climb' };
  if (progress < 0.85) return { name: 'CRUISE', class: 'phase-cruise' };
  if (progress < 0.95) return { name: 'DESCENT', class: 'phase-descent' };
  if (progress < 0.99) return { name: 'APPROACH', class: 'phase-approach' };
  return { name: 'LANDED', class: 'phase-landed' };
}

function getAltitude(progress) {
  if (progress < 0.02) return Math.round(progress / 0.02 * 5000);
  if (progress < 0.12) return Math.round(5000 + ((progress - 0.02) / 0.10) * 31000);
  if (progress < 0.85) return 36000;
  if (progress < 0.95) return Math.round(36000 - ((progress - 0.85) / 0.10) * 30000);
  if (progress < 0.99) return Math.round(6000 - ((progress - 0.95) / 0.04) * 5500);
  return 0;
}

function getSpeed(progress) {
  if (progress < 0.02) return Math.round(80 + (progress / 0.02) * 170);
  if (progress < 0.12) return Math.round(250 + ((progress - 0.02) / 0.10) * 220);
  if (progress < 0.85) return 470;
  if (progress < 0.95) return Math.round(470 - ((progress - 0.85) / 0.10) * 200);
  if (progress < 0.99) return Math.round(270 - ((progress - 0.95) / 0.04) * 130);
  return 0;
}

function getVerticalSpeed(progress) {
  if (progress < 0.02) return 3500;
  if (progress < 0.12) return 2200;
  if (progress < 0.85) return 0;
  if (progress < 0.95) return -1800;
  if (progress < 0.99) return -800;
  return 0;
}

function runPTFS(points, totalKm, fromCode, toCode) {
  const hud = document.getElementById('ptfs-hud');
  const progressBar = document.getElementById('progress-bar');
  hud.classList.add('active');
  progressBar.classList.add('active');
  document.getElementById('progress-route').innerHTML = `${fromCode} &rarr; ${toCode}`;

  let planeMarker = null;
  let trailPolyline = null;
  let trailCoords = [];
  let progress = 0;
  let lastTime = performance.now();
  let lastPanTime = 0;
  let lastHdg = 0;
  let lastFrameTime = 0;
  const totalNm = totalKm * 0.539957;

  const baseDuration = Math.max(30, totalKm / 100);

  function animate(now) {
    if (now - lastFrameTime < 33) { animationId = requestAnimationFrame(animate); return; }
    lastFrameTime = now;
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    const increment = (dt * simSpeed) / baseDuration;
    progress = Math.min(progress + increment, 1);

    const idx = Math.min(Math.floor(progress * (points.length - 1)), points.length - 2);
    const frac = (progress * (points.length - 1)) - idx;
    const lat = points[idx][0] + frac * (points[idx + 1][0] - points[idx][0]);
    const lon = points[idx][1] + frac * (points[idx + 1][1] - points[idx][1]);

    const hdg = bearing(points[idx][0], points[idx][1], points[Math.min(idx + 2, points.length - 1)][0], points[Math.min(idx + 2, points.length - 1)][1]);

    if (planeMarker) {
      planeMarker.setLatLng([lat, lon]);
      if (Math.abs(hdg - lastHdg) > 2) {
        planeMarker.setIcon(createRotatedPlaneIcon(hdg));
        lastHdg = hdg;
      }
    } else {
      planeMarker = L.marker([lat, lon], { icon: createRotatedPlaneIcon(hdg), zIndexOffset: 1000 }).addTo(flightLayer);
      lastHdg = hdg;
    }

    if (!trailCoords.length || idx % 3 === 0) {
      trailCoords.push([lat, lon]);
      if (trailPolyline) {
        trailPolyline.setLatLngs(trailCoords);
      } else {
        trailPolyline = L.polyline(trailCoords, { color: '#00ff88', weight: 2, opacity: 0.5 }).addTo(flightLayer);
      }
    }

    if (now - lastPanTime > 500) {
      map.panTo([lat, lon], { animate: false });
      lastPanTime = now;
    }

    const phase = getFlightPhase(progress);
    const alt = getAltitude(progress);
    const spd = getSpeed(progress);
    const vs = getVerticalSpeed(progress);
    const remaining = Math.round(totalNm * (1 - progress));

    document.getElementById('hud-speed').textContent = spd;
    document.getElementById('hud-alt').textContent = alt.toLocaleString();
    document.getElementById('hud-hdg').textContent = Math.round(hdg).toString().padStart(3, '0');
    document.getElementById('hud-vs').textContent = vs > 0 ? `+${vs}` : vs.toString();
    document.getElementById('hud-dist').textContent = remaining.toLocaleString();
    document.getElementById('hud-phase').innerHTML = `<span class="phase-badge ${phase.class}">${phase.name}</span>`;

    const pct = Math.round(progress * 100);
    document.getElementById('progress-pct').textContent = `${pct}%`;
    document.getElementById('progress-fill').style.width = `${pct}%`;

    if (progress < 1) {
      animationId = requestAnimationFrame(animate);
    } else {
      document.getElementById('hud-speed').textContent = '0';
      document.getElementById('hud-alt').textContent = '0';
      document.getElementById('hud-vs').textContent = '0';
      document.getElementById('hud-dist').textContent = '0';
      document.getElementById('hud-phase').innerHTML = '<span class="phase-badge phase-landed">LANDED</span>';

      document.getElementById('info-bar').innerHTML = `
        <div class="info-item"><span class="info-value" style="color:#00e676">&#10003; LANDED at ${toCode}</span></div>
        <div class="info-item"><span class="info-label">Distance</span><span class="info-value">${Math.round(totalKm).toLocaleString()} km</span></div>
      `;
    }
  }

  animationId = requestAnimationFrame(animate);
}

function resolveAirport(input) {
  const val = input.toUpperCase();
  const pool = Object.entries(AIRPORTS).filter(([, a]) => !ptfsMode || a.country === 'PTFS');
  const exact = pool.find(([code]) => code === val);
  if (exact) return { code: exact[0], data: exact[1] };
  for (const [code, data] of pool) {
    if (code.includes(val)) return { code, data };
  }
  for (const [code, data] of pool) {
    if (data.city.toUpperCase().includes(val) || data.name.toUpperCase().includes(val)) return { code, data };
  }
  return null;
}

function fly() {
  stopAnimation();

  const fromInput = document.getElementById('from').value.trim().toUpperCase();
  const toInput = document.getElementById('to').value.trim().toUpperCase();

  if (!fromInput || !toInput) {
    document.getElementById('info-bar').innerHTML = '<span class="error-msg">Enter both airport codes</span>';
    return;
  }

  const fromResult = resolveAirport(fromInput);
  const toResult = resolveAirport(toInput);

  if (!fromResult) {
    document.getElementById('info-bar').innerHTML = `<span class="error-msg">Unknown airport: ${fromInput}</span>`;
    return;
  }
  if (!toResult) {
    document.getElementById('info-bar').innerHTML = `<span class="error-msg">Unknown airport: ${toInput}</span>`;
    return;
  }

  const fromCode = fromResult.code;
  const toCode = toResult.code;
  const from = fromResult.data;
  const to = toResult.data;
  document.getElementById('from').value = fromCode;
  document.getElementById('to').value = toCode;

  currentFromCode = fromCode;
  currentToCode = toCode;
  flightLayer.clearLayers();

  const points = greatCirclePoints(from.lat, from.lon, to.lat, to.lon);
  const segments = splitAntimeridian(points);

  segments.forEach(seg => {
    L.polyline(seg, { color: '#00d2ff', weight: 3, opacity: 0.8, dashArray: '10, 6' }).addTo(flightLayer);
    L.polyline(seg, { color: '#7b2ff7', weight: 1.5, opacity: 0.4 }).addTo(flightLayer);
  });

  L.marker([from.lat, from.lon], { icon: createAirportIcon(fromCode) }).addTo(flightLayer);
  L.marker([to.lat, to.lon], { icon: createAirportIcon(toCode) }).addTo(flightLayer);

  const km = haversineKm(from.lat, from.lon, to.lat, to.lon);
  const miles = Math.round(km * 0.621371);
  const time = estimateFlightTime(km);

  document.getElementById('info-bar').innerHTML = `
    <div class="info-item"><span class="info-label">Route</span><span class="info-value">${fromCode} &rarr; ${toCode}</span></div>
    <div class="info-item"><span class="info-label">Distance</span><span class="info-value">${Math.round(km).toLocaleString()} km (${miles.toLocaleString()} mi)</span></div>
    <div class="info-item"><span class="info-label">Est. Flight Time</span><span class="info-value">${time}</span></div>
    <div class="info-item"><span class="info-label">From</span><span class="info-value">${from.name}, ${from.city}</span></div>
    <div class="info-item"><span class="info-label">To</span><span class="info-value">${to.name}, ${to.city}</span></div>
  `;

  const bounds = L.latLngBounds(points);
  map.fitBounds(bounds, { padding: [50, 50] });

  if (ptfsMode) {
    setTimeout(() => {
      map.setView([from.lat, from.lon], 5, { animate: false });
      runPTFS(points, km, fromCode, toCode);
    }, 400);
  } else {
    const midIdx = Math.floor(points.length / 2);
    L.marker(points[midIdx], { icon: createRotatedPlaneIcon(bearing(points[midIdx][0], points[midIdx][1], points[midIdx+1][0], points[midIdx+1][1])) }).addTo(flightLayer);
  }
}

// Autocomplete
function setupAutocomplete(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  let selectedIdx = -1;

  input.addEventListener('input', () => {
    const val = input.value.trim().toUpperCase();
    list.innerHTML = '';
    selectedIdx = -1;
    if (val.length === 0) { list.classList.remove('active'); return; }

    const matches = Object.entries(AIRPORTS)
      .filter(([code, a]) => {
        if (ptfsMode && a.country !== 'PTFS') return false;
        return code.includes(val) ||
          code.startsWith(val) ||
          a.city.toUpperCase().includes(val) ||
          a.name.toUpperCase().includes(val);
      })
      .slice(0, 8);

    if (matches.length === 0) { list.classList.remove('active'); return; }

    matches.forEach(([code, a]) => {
      const div = document.createElement('div');
      div.className = 'autocomplete-item';
      div.innerHTML = `<span class="code">${code}</span><span class="name">${a.name}, ${a.city}</span>`;
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = code;
        list.classList.remove('active');
      });
      list.appendChild(div);
    });
    list.classList.add('active');
  });

  input.addEventListener('keydown', (e) => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedIdx = Math.min(selectedIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedIdx = Math.max(selectedIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
    } else if (e.key === 'Enter') {
      if (selectedIdx >= 0 && items[selectedIdx]) {
        input.value = items[selectedIdx].querySelector('.code').textContent;
        list.classList.remove('active');
        e.preventDefault();
      } else if (list.classList.contains('active') && items.length > 0) {
        input.value = items[0].querySelector('.code').textContent;
        list.classList.remove('active');
        e.preventDefault();
      } else {
        fly();
      }
    } else if (e.key === 'Escape') {
      list.classList.remove('active');
    }
  });

  input.addEventListener('blur', () => {
    setTimeout(() => list.classList.remove('active'), 150);
  });
}

setupAutocomplete('from', 'from-list');
setupAutocomplete('to', 'to-list');

document.getElementById('fly-btn').addEventListener('click', fly);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.querySelector('.autocomplete-list.active')) {
    fly();
  }
});
</script>

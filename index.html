<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Path Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 16px 24px;
  border-bottom: 2px solid #0f3460;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  z-index: 500;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(90deg, #00d2ff, #7b2ff7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-right: auto;
}
.input-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.input-group label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
}
.airport-input {
  background: #0d1b2a;
  border: 2px solid #1b2838;
  color: #fff;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 700;
  width: 120px;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: border-color 0.2s;
}
.airport-input:focus {
  outline: none;
  border-color: #00d2ff;
}
.arrow { font-size: 24px; color: #00d2ff; }
.fly-btn, .mode-btn {
  border: none;
  color: #fff;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fly-btn {
  background: linear-gradient(135deg, #00d2ff 0%, #7b2ff7 100%);
}
.mode-btn {
  background: linear-gradient(135deg, #ff6b35 0%, #f7c948 100%);
  font-size: 13px;
  padding: 10px 16px;
}
.mode-btn.active {
  background: linear-gradient(135deg, #00e676 0%, #00bfa5 100%);
}
.fly-btn:hover, .mode-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0, 210, 255, 0.3);
}
.fly-btn:active, .mode-btn:active { transform: translateY(0); }
#map { flex: 1; background: #0a0a1a; }
.info-bar {
  background: #1a1a2e;
  padding: 12px 24px;
  display: flex;
  gap: 32px;
  align-items: center;
  border-top: 2px solid #0f3460;
  font-size: 14px;
  min-height: 48px;
  flex-wrap: wrap;
}
.info-item { display: flex; align-items: center; gap: 6px; }
.info-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.info-value { color: #00d2ff; font-weight: 700; font-size: 16px; }
.error-msg { color: #ff4757; font-weight: 600; }
.autocomplete-wrapper { position: relative; }
.autocomplete-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #0d1b2a;
  border: 2px solid #1b2838;
  border-top: none;
  border-radius: 0 0 8px 8px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
}
.autocomplete-list.active { display: block; }
.autocomplete-item {
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid #1b2838;
}
.autocomplete-item:hover, .autocomplete-item.selected { background: #16213e; }
.autocomplete-item .code { font-weight: 700; color: #00d2ff; font-size: 15px; margin-right: 8px; }
.autocomplete-item .name { color: #aaa; }
.plane-icon { font-size: 20px; filter: drop-shadow(0 0 6px rgba(0, 210, 255, 0.8)); }

/* PTFS HUD */
.ptfs-hud {
  display: none;
  position: absolute;
  bottom: 60px;
  left: 0;
  right: 0;
  z-index: 800;
  pointer-events: none;
}
.ptfs-hud.active { display: flex; }
.hud-panel {
  background: rgba(10, 10, 26, 0.92);
  border: 2px solid #0f3460;
  border-radius: 12px;
  padding: 16px 20px;
  margin: 0 auto;
  display: flex;
  gap: 24px;
  align-items: center;
  pointer-events: auto;
  backdrop-filter: blur(8px);
}
.hud-gauge {
  text-align: center;
  min-width: 80px;
}
.hud-gauge .gauge-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #888;
  margin-bottom: 4px;
}
.hud-gauge .gauge-value {
  font-size: 24px;
  font-weight: 800;
  font-family: 'Courier New', monospace;
  color: #00ff88;
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
}
.hud-gauge .gauge-unit {
  font-size: 11px;
  color: #666;
  margin-left: 2px;
}
.hud-divider {
  width: 1px;
  height: 50px;
  background: #0f3460;
}
.phase-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.phase-taxi { background: #f7c948; color: #000; }
.phase-takeoff { background: #ff6b35; color: #fff; }
.phase-climb { background: #7b2ff7; color: #fff; }
.phase-cruise { background: #00d2ff; color: #000; }
.phase-descent { background: #e040fb; color: #fff; }
.phase-approach { background: #ff6b35; color: #fff; }
.phase-landed { background: #00e676; color: #000; }

.progress-bar-container {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 800;
  display: none;
  pointer-events: auto;
  background: rgba(10, 10, 26, 0.88);
  border: 2px solid #0f3460;
  border-radius: 10px;
  padding: 10px 20px;
  min-width: 360px;
  backdrop-filter: blur(8px);
}
.progress-bar-container.active { display: block; }
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}
.progress-label .route-label { color: #00d2ff; font-weight: 700; }
.progress-track {
  height: 8px;
  background: #1b2838;
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00d2ff, #7b2ff7);
  border-radius: 4px;
  transition: width 0.3s;
}
.speed-controls {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  justify-content: center;
}
.speed-btn {
  background: #1b2838;
  border: 1px solid #0f3460;
  color: #888;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  font-weight: 700;
}
.speed-btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; }
.speed-btn:hover { border-color: #00d2ff; }
.ptfs-tooltip {
  background: rgba(10,10,26,0.9) !important;
  border: 1px solid #00d2ff !important;
  color: #00d2ff !important;
  font-weight: 700 !important;
  font-size: 12px !important;
  border-radius: 6px !important;
  padding: 4px 8px !important;
  box-shadow: 0 2px 10px rgba(0,210,255,0.3) !important;
}
.ptfs-tooltip::before { border-top-color: #00d2ff !important; }

@media (max-width: 700px) {
  .header {
    padding: 10px 12px;
    gap: 6px;
    justify-content: center;
  }
  .header h1 {
    font-size: 15px;
    width: 100%;
    text-align: center;
    margin-right: 0;
  }
  .input-group label { font-size: 10px; }
  .airport-input {
    width: 68px;
    padding: 8px 6px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  .arrow { font-size: 16px; }
  .fly-btn, .mode-btn {
    padding: 8px 12px;
    font-size: 12px;
  }
  .progress-bar-container {
    min-width: 0;
    width: calc(100% - 20px);
    left: 10px;
    right: 10px;
    transform: none;
    top: auto;
    position: relative;
    margin: 4px auto;
    border-radius: 8px;
  }
  .ptfs-hud { bottom: 48px; left: 4px; right: 4px; }
  .hud-panel {
    gap: 8px;
    padding: 8px 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 100%;
  }
  .hud-gauge { min-width: 50px; }
  .hud-gauge .gauge-value { font-size: 15px; }
  .hud-gauge .gauge-label { font-size: 8px; letter-spacing: 0.5px; }
  .hud-gauge .gauge-unit { font-size: 8px; }
  .hud-divider { height: 28px; }
  .info-bar {
    padding: 6px 10px;
    gap: 10px;
    font-size: 11px;
  }
  .info-value { font-size: 12px; }
  .info-label { font-size: 8px; }
  .autocomplete-list { max-height: 150px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Flight Path Tracker</h1>
  <div class="input-group">
    <label>From</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="from" class="airport-input" placeholder="EDI" maxlength="4" autocomplete="off">
      <div class="autocomplete-list" id="from-list"></div>
    </div>
  </div>
  <button id="swap-btn" title="Swap airports" style="background:none;border:1px solid #1b2838;color:#00d2ff;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background 0.2s;">&#8644;</button>
  <div class="input-group">
    <label>To</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="to" class="airport-input" placeholder="JFK" maxlength="4" autocomplete="off">
      <div class="autocomplete-list" id="to-list"></div>
    </div>
  </div>
  <button class="fly-btn" id="fly-btn">FLY</button>
  <button class="fly-btn" id="fly3d-btn" style="display:none;background:linear-gradient(135deg,#e040fb,#ff6b35);">3D FLY</button>
  <button class="mode-btn" id="mode-btn">PTFS MODE</button>
</div>

<div id="flight3d-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:#000;">
  <canvas id="flight3d-canvas" style="width:100%; height:100%;"></canvas>
  <div id="flight3d-hud" style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(10,10,26,0.9); border:2px solid #0f3460; border-radius:12px; padding:12px 20px; display:flex; gap:20px; align-items:center; font-family:monospace;">
    <div style="text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;">Speed</div><div style="font-size:20px;font-weight:800;color:#00ff88;" id="hud3d-speed">0</div></div>
    <div style="width:1px;height:36px;background:#0f3460;"></div>
    <div style="text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;">Alt</div><div style="font-size:20px;font-weight:800;color:#00ff88;" id="hud3d-alt">0</div></div>
    <div style="width:1px;height:36px;background:#0f3460;"></div>
    <div style="text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;">Progress</div><div style="font-size:20px;font-weight:800;color:#00d2ff;" id="hud3d-pct">0%</div></div>
    <div style="width:1px;height:36px;background:#0f3460;"></div>
    <div style="text-align:center"><div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;">Phase</div><div style="font-size:14px;font-weight:700;color:#f7c948;" id="hud3d-phase">READY</div></div>
  </div>
  <button id="flight3d-close" style="position:absolute;top:16px;right:16px;background:rgba(255,71,87,0.9);border:none;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;z-index:2001;">EXIT 3D</button>
  <div id="flight3d-controls" style="position:absolute;top:16px;left:16px;color:#888;font-size:12px;font-family:sans-serif;background:rgba(10,10,26,0.8);padding:8px 12px;border-radius:8px;">
    W/S or ↑/↓ — Pitch &nbsp; A/D or ←/→ — Roll &nbsp; Q/E — Throttle
  </div>
  <!-- Touch joystick (left) and throttle (right) -->
  <div id="touch-controls" style="display:none; position:absolute; bottom:80px; left:0; right:0; pointer-events:none;">
    <div id="joystick-zone" style="position:absolute; left:30px; bottom:0; width:140px; height:140px; pointer-events:auto; background:rgba(255,255,255,0.08); border:2px solid rgba(0,210,255,0.3); border-radius:50%;">
      <div id="joystick-knob" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:50px; height:50px; background:rgba(0,210,255,0.4); border-radius:50%; border:2px solid rgba(0,210,255,0.6);"></div>
      <div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:#888;font-family:sans-serif;">PITCH / ROLL</div>
    </div>
    <div id="throttle-zone" style="position:absolute; right:30px; bottom:0; width:60px; height:140px; pointer-events:auto; background:rgba(255,255,255,0.08); border:2px solid rgba(0,210,255,0.3); border-radius:30px;">
      <div id="throttle-knob" style="position:absolute; left:50%; bottom:40%; transform:translate(-50%,50%); width:44px; height:30px; background:rgba(0,255,136,0.4); border-radius:15px; border:2px solid rgba(0,255,136,0.6);"></div>
      <div style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:#888;font-family:sans-serif;">THROTTLE</div>
    </div>
  </div>
</div>

<div id="map"></div>

<div class="progress-bar-container" id="progress-bar">
  <div class="progress-label">
    <span class="route-label" id="progress-route">EDI &rarr; JFK</span>
    <span id="progress-pct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="speed-controls">
    <button class="speed-btn" id="pause-btn" data-speed="0">&#10074;&#10074;</button>
    <button class="speed-btn" data-speed="1">1x</button>
    <button class="speed-btn" data-speed="2">2x</button>
    <button class="speed-btn active" data-speed="5">5x</button>
    <button class="speed-btn" data-speed="10">10x</button>
    <button class="speed-btn" data-speed="30">MAX</button>
  </div>
</div>

<div class="ptfs-hud" id="ptfs-hud">
  <div class="hud-panel">
    <div class="hud-gauge">
      <div class="gauge-label">Speed</div>
      <div class="gauge-value"><span id="hud-speed">0</span><span class="gauge-unit">kts</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Altitude</div>
      <div class="gauge-value"><span id="hud-alt">0</span><span class="gauge-unit">ft</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Heading</div>
      <div class="gauge-value"><span id="hud-hdg">---</span><span class="gauge-unit">&deg;</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">V/S</div>
      <div class="gauge-value"><span id="hud-vs">0</span><span class="gauge-unit">fpm</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Phase</div>
      <div id="hud-phase"><span class="phase-badge phase-taxi">READY</span></div>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-gauge">
      <div class="gauge-label">Remaining</div>
      <div class="gauge-value"><span id="hud-dist">---</span><span class="gauge-unit">nm</span></div>
    </div>
  </div>
</div>

<div class="info-bar" id="info-bar">
  <span style="color:#888">Enter departure and arrival airports, then hit FLY</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function greatCirclePoints(lat1, lon1, lat2, lon2, n = 200) {
  lat1 = toRad(lat1); lon1 = toRad(lon1);
  lat2 = toRad(lat2); lon2 = toRad(lon2);
  const d = 2 * Math.asin(Math.sqrt(
    Math.pow(Math.sin((lat2 - lat1) / 2), 2) +
    Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin((lon2 - lon1) / 2), 2)
  ));
  const points = [];
  for (let i = 0; i <= n; i++) {
    const f = i / n;
    const A = Math.sin((1 - f) * d) / Math.sin(d);
    const B = Math.sin(f * d) / Math.sin(d);
    const x = A * Math.cos(lat1) * Math.cos(lon1) + B * Math.cos(lat2) * Math.cos(lon2);
    const y = A * Math.cos(lat1) * Math.sin(lon1) + B * Math.cos(lat2) * Math.sin(lon2);
    const z = A * Math.sin(lat1) + B * Math.sin(lat2);
    points.push([toDeg(Math.atan2(z, Math.sqrt(x * x + y * y))), toDeg(Math.atan2(y, x))]);
  }
  return points;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function estimateFlightTime(km) {
  const cruiseSpeed = 850;
  const hours = km / cruiseSpeed + 0.5;
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  return `${h}h ${m}m`;
}

function unwrapLongitudes(points) {
  const result = [[points[0][0], points[0][1]]];
  for (let i = 1; i < points.length; i++) {
    let lon = points[i][1];
    const prevLon = result[i - 1][1];
    while (lon - prevLon > 180) lon -= 360;
    while (prevLon - lon > 180) lon += 360;
    result.push([points[i][0], lon]);
  }
  return result;
}

function bearing(lat1, lon1, lat2, lon2) {
  lat1 = toRad(lat1); lon1 = toRad(lon1);
  lat2 = toRad(lat2); lon2 = toRad(lon2);
  const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

  btn.addEventListener('click', () => {

    btn.classList.add('active');
    simSpeed = parseInt(btn.dataset.speed);
  });
});

function stopAnimation() {
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
}

function getFlightPhase(progress) {
  if (progress < 0.02) return { name: 'TAKEOFF', class: 'phase-takeoff' };
  if (progress < 0.12) return { name: 'CLIMB', class: 'phase-climb' };
  if (progress < 0.85) return { name: 'CRUISE', class: 'phase-cruise' };
  if (progress < 0.95) return { name: 'DESCENT', class: 'phase-descent' };
  if (progress < 0.99) return { name: 'APPROACH', class: 'phase-approach' };
  return { name: 'LANDED', class: 'phase-landed' };
}

function getAltitude(progress) {
  if (progress < 0.02) return Math.round(progress / 0.02 * 5000);
  if (progress < 0.12) return Math.round(5000 + ((progress - 0.02) / 0.10) * 31000);
  if (progress < 0.85) return 36000;
  if (progress < 0.95) return Math.round(36000 - ((progress - 0.85) / 0.10) * 30000);
  if (progress < 0.99) return Math.round(6000 - ((progress - 0.95) / 0.04) * 5500);
  return 0;
}

function getSpeed(progress) {
  if (progress < 0.02) return Math.round(80 + (progress / 0.02) * 170);
  if (progress < 0.12) return Math.round(250 + ((progress - 0.02) / 0.10) * 220);
  if (progress < 0.85) return 470;
  if (progress < 0.95) return Math.round(470 - ((progress - 0.85) / 0.10) * 200);
  if (progress < 0.99) return Math.round(270 - ((progress - 0.95) / 0.04) * 130);
  return 0;
}

function getVerticalSpeed(progress) {
  if (progress < 0.02) return 3500;
  if (progress < 0.12) return 2200;
  if (progress < 0.85) return 0;
  if (progress < 0.95) return -1800;
  if (progress < 0.99) return -800;
  return 0;
}

function runPTFS(points, totalKm, fromCode, toCode) {
  const hud = document.getElementById('ptfs-hud');
  const progressBar = document.getElementById('progress-bar');
  hud.classList.add('active');
  progressBar.classList.add('active');
  document.getElementById('progress-route').innerHTML = `${fromCode} &rarr; ${toCode}`;

  let planeMarker = null;
  let trailPolyline = null;
  let trailCoords = [];
  let progress = 0;
  let lastTime = null;
  let lastHdg = 0;
  let frameCount = 0;
  let camLat = points[0][0];
  let camLon = points[0][1];
  const totalNm = totalKm * 0.539957;

  const flightDurationSec = 60;

  function animate(now) {
    if (lastTime === null) lastTime = now;
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    frameCount++;

    const increment = (dt * simSpeed) / flightDurationSec;
    progress = Math.min(progress + increment, 1);

    const idx = Math.min(Math.floor(progress * (points.length - 1)), points.length - 2);
    const frac = (progress * (points.length - 1)) - idx;
    const lat = points[idx][0] + frac * (points[idx + 1][0] - points[idx][0]);
    const lon = points[idx][1] + frac * (points[idx + 1][1] - points[idx][1]);

    const nextIdx = Math.min(idx + 2, points.length - 1);
    const hdg = bearing(points[idx][0], points[idx][1], points[nextIdx][0], points[nextIdx][1]);

    if (planeMarker) {
      planeMarker.setLatLng([lat, lon]);
      if (Math.abs(hdg - lastHdg) > 2) {
        planeMarker.setIcon(createRotatedPlaneIcon(hdg));
        lastHdg = hdg;
      }
    } else {
      planeMarker = L.marker([lat, lon], { icon: createRotatedPlaneIcon(hdg), zIndexOffset: 1000 }).addTo(flightLayer);
      lastHdg = hdg;
    }

    if (frameCount % 5 === 0) {
      trailCoords.push([lat, lon]);
      if (trailPolyline) {
        trailPolyline.setLatLngs(trailCoords);
      } else {
        trailPolyline = L.polyline(trailCoords, { color: '#00ff88', weight: 2, opacity: 0.5 }).addTo(flightLayer);
      }
    }

    const smooth = 0.15;
    const newLat = camLat + (lat - camLat) * smooth;
    const newLon = camLon + (lon - camLon) * smooth;
    if (Math.abs(newLat - camLat) > 0.001 || Math.abs(newLon - camLon) > 0.001) {
      camLat = newLat;
      camLon = newLon;
      map.setView([camLat, camLon], map.getZoom(), { animate: false });
    }

    const phase = getFlightPhase(progress);
    const alt = getAltitude(progress);
    const spd = getSpeed(progress);
    const vs = getVerticalSpeed(progress);
    const remaining = Math.round(totalNm * (1 - progress));
    const pct = Math.round(progress * 100);

    // ETA calculation
    const etaMin = simSpeed > 0 ? Math.round((1 - progress) * flightDurationSec / simSpeed / 60) : 0;
    const etaSec = simSpeed > 0 ? Math.round((1 - progress) * flightDurationSec / simSpeed) % 60 : 0;

    // Only update DOM when values change (perf)
    const hudEl = (id, val) => { const el = document.getElementById(id); if (el.textContent !== String(val)) el.textContent = val; };
    hudEl('hud-speed', spd);
    hudEl('hud-alt', alt.toLocaleString());
    hudEl('hud-hdg', Math.round(hdg).toString().padStart(3, '0'));
    hudEl('hud-vs', vs > 0 ? `+${vs}` : vs.toString());
    hudEl('hud-dist', remaining.toLocaleString());

    const phaseHtml = `<span class="phase-badge ${phase.class}">${phase.name}</span>`;
    const phaseEl = document.getElementById('hud-phase');
    if (phaseEl._lastPhase !== phase.name) { phaseEl.innerHTML = phaseHtml; phaseEl._lastPhase = phase.name; }

    hudEl('progress-pct', simSpeed > 0 ? `${pct}% — ETA ${etaMin}:${etaSec.toString().padStart(2,'0')}` : `${pct}% — PAUSED`);
    document.getElementById('progress-fill').style.width = `${pct}%`;

    if (progress < 1) {
      animationId = requestAnimationFrame(animate);
    } else {
      hudEl('hud-speed', '0');
      hudEl('hud-alt', '0');
      hudEl('hud-vs', '0');
      hudEl('hud-dist', '0');
      document.getElementById('hud-phase').innerHTML = '<span class="phase-badge phase-landed">LANDED</span>';

      document.getElementById('info-bar').innerHTML = `
        <div class="info-item"><span class="info-value" style="color:#00e676">&#10003; LANDED at ${toCode}</span></div>
        <div class="info-item"><span class="info-label">Distance</span><span class="info-value">${Math.round(totalKm).toLocaleString()} km</span></div>
      `;
    }
  }

  animationId = requestAnimationFrame(animate);
}

function resolveAirport(input) {
  const val = input.toUpperCase();
  const pool = Object.entries(AIRPORTS).filter(([, a]) => !ptfsMode || a.country === 'PTFS');
  const exact = pool.find(([code]) => code === val);
  if (exact) return { code: exact[0], data: exact[1] };
  for (const [code, data] of pool) {
    if (code.includes(val)) return { code, data };
  }
  for (const [code, data] of pool) {
    if (data.city.toUpperCase().includes(val) || data.name.toUpperCase().includes(val)) return { code, data };
  }
  return null;
}

function fly() {
  stopAnimation();

  const fromInput = document.getElementById('from').value.trim().toUpperCase();
  const toInput = document.getElementById('to').value.trim().toUpperCase();

  if (!fromInput || !toInput) {
    document.getElementById('info-bar').innerHTML = '<span class="error-msg">Enter both airport codes</span>';
    return;
  }

  const fromResult = resolveAirport(fromInput);
  const toResult = resolveAirport(toInput);

  if (!fromResult) {
    document.getElementById('info-bar').innerHTML = `<span class="error-msg">Unknown airport: ${fromInput}</span>`;
    return;
  }
  if (!toResult) {
    document.getElementById('info-bar').innerHTML = `<span class="error-msg">Unknown airport: ${toInput}</span>`;
    return;
  }

  const fromCode = fromResult.code;
  const toCode = toResult.code;
  const from = fromResult.data;
  const to = toResult.data;

  if (fromCode === toCode) {
    document.getElementById('info-bar').innerHTML = '<span class="error-msg">Pick two different airports!</span>';
    return;
  }

  document.getElementById('from').value = fromCode;
  document.getElementById('to').value = toCode;

  // Update URL for sharing
  const params = new URLSearchParams();
  params.set('from', fromCode);
  params.set('to', toCode);
  if (ptfsMode) params.set('ptfs', '1');
  history.replaceState(null, '', '?' + params.toString());

  currentFromCode = fromCode;
  currentToCode = toCode;
  flightLayer.clearLayers();

  const rawPoints = greatCirclePoints(from.lat, from.lon, to.lat, to.lon);
  const points = unwrapLongitudes(rawPoints);

  L.polyline(points, { color: '#00d2ff', weight: 3, opacity: 0.8, dashArray: '10, 6' }).addTo(flightLayer);
  L.polyline(points, { color: '#7b2ff7', weight: 1.5, opacity: 0.4 }).addTo(flightLayer);

  L.marker([from.lat, from.lon], { icon: createAirportIcon(fromCode) }).addTo(flightLayer);
  L.marker([to.lat, to.lon], { icon: createAirportIcon(toCode) }).addTo(flightLayer);

  const km = haversineKm(from.lat, from.lon, to.lat, to.lon);
  const miles = Math.round(km * 0.621371);
  const time = estimateFlightTime(km);

  document.getElementById('info-bar').innerHTML = `
    <div class="info-item"><span class="info-label">Route</span><span class="info-value">${fromCode} &rarr; ${toCode}</span></div>
    <div class="info-item"><span class="info-label">Distance</span><span class="info-value">${Math.round(km).toLocaleString()} km (${miles.toLocaleString()} mi)</span></div>
    <div class="info-item"><span class="info-label">Est. Flight Time</span><span class="info-value">${time}</span></div>
    <div class="info-item"><span class="info-label">From</span><span class="info-value">${from.name}, ${from.city}</span></div>
    <div class="info-item"><span class="info-label">To</span><span class="info-value">${to.name}, ${to.city}</span></div>
  `;

  const bounds = L.latLngBounds(points);
  map.fitBounds(bounds, { padding: [50, 50] });

  current3DPoints = points;
  document.getElementById('fly3d-btn').style.display = '';

  if (ptfsMode) {
    setTimeout(() => {
      map.setView([from.lat, from.lon], 5, { animate: false });
      runPTFS(points, km, fromCode, toCode);
    }, 400);
  } else {
    const midIdx = Math.floor(points.length / 2);
    L.marker(points[midIdx], { icon: createRotatedPlaneIcon(bearing(points[midIdx][0], points[midIdx][1], points[midIdx+1][0], points[midIdx+1][1])) }).addTo(flightLayer);
  }
}

// Autocomplete
function setupAutocomplete(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  let selectedIdx = -1;

  input.addEventListener('input', () => {
    const val = input.value.trim().toUpperCase();
    list.innerHTML = '';
    selectedIdx = -1;
    if (val.length === 0) { list.classList.remove('active'); return; }

    const matches = Object.entries(AIRPORTS)
      .filter(([code, a]) => {
        if (ptfsMode && a.country !== 'PTFS') return false;
        return code.includes(val) ||
          code.startsWith(val) ||
          a.city.toUpperCase().includes(val) ||
          a.name.toUpperCase().includes(val);
      })
      .slice(0, 8);

    if (matches.length === 0) { list.classList.remove('active'); return; }

    matches.forEach(([code, a]) => {
      const div = document.createElement('div');
      div.className = 'autocomplete-item';
      div.innerHTML = `<span class="code">${code}</span><span class="name">${a.name}, ${a.city}</span>`;
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = code;
        list.classList.remove('active');
      });
      list.appendChild(div);
    });
    list.classList.add('active');
  });

  input.addEventListener('keydown', (e) => {
    const items = list.querySelectorAll('.autocomplete-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedIdx = Math.min(selectedIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedIdx = Math.max(selectedIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
    } else if (e.key === 'Enter') {
      if (selectedIdx >= 0 && items[selectedIdx]) {
        input.value = items[selectedIdx].querySelector('.code').textContent;
        list.classList.remove('active');
        e.preventDefault();
      } else if (list.classList.contains('active') && items.length > 0) {
        input.value = items[0].querySelector('.code').textContent;
        list.classList.remove('active');
        e.preventDefault();
      } else {
        fly();
      }
    } else if (e.key === 'Escape') {
      list.classList.remove('active');
    }
  });

  input.addEventListener('blur', () => {
    setTimeout(() => list.classList.remove('active'), 150);
  });
}

// === 3D FLIGHT MODE ===
let current3DPoints = null;
let flight3DActive = false;
let anim3DId = null;

document.getElementById('fly3d-btn').addEventListener('click', () => {
  if (!current3DPoints || current3DPoints.length < 2) return;
  launch3DFlight(current3DPoints);
});

document.getElementById('flight3d-close').addEventListener('click', () => {
  close3DFlight();
});

let cleanup3D = null;
function close3DFlight() {
  flight3DActive = false;
  if (anim3DId) cancelAnimationFrame(anim3DId);
  anim3DId = null;
  if (cleanup3D) { cleanup3D(); cleanup3D = null; }
  document.getElementById('flight3d-overlay').style.display = 'none';
  document.getElementById('touch-controls').style.display = 'none';
}

function launch3DFlight(routePoints) {
  const overlay = document.getElementById('flight3d-overlay');
  overlay.style.display = 'block';
  flight3DActive = true;

  const canvas = document.getElementById('flight3d-canvas');
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/three@0.160.0/build/three.min.js';
  script.onload = () => init3D(canvas, routePoints);
  if (window.THREE) {
    init3D(canvas, routePoints);
  } else {
    document.head.appendChild(script);
  }
}

function init3D(canvas, routePoints) {
  const THREE = window.THREE;
  const W = window.innerWidth;
  const H = window.innerHeight;

  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x0a1628);

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x0a1628, 400, 1500);

  const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 3000);

  const ambient = new THREE.AmbientLight(0x4466aa, 0.6);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
  sun.position.set(100, 200, 50);
  scene.add(sun);

  // Ocean - bright enough to actually see
  const oceanGeo = new THREE.PlaneGeometry(4000, 4000, 1, 1);
  const oceanMat = new THREE.MeshPhongMaterial({
    color: 0x1a5276,
    shininess: 60,
    specular: 0x2980b9
  });
  const ocean = new THREE.Mesh(oceanGeo, oceanMat);
  ocean.rotation.x = -Math.PI / 2;
  ocean.position.y = -0.5;
  scene.add(ocean);

  // Grid on ocean - visible lines
  const grid = new THREE.GridHelper(4000, 100, 0x1a6a8a, 0x14506a);
  grid.position.y = 0;
  scene.add(grid);

  // Build 3D path from route points
  const pathScale = 15;
  const path3D = routePoints.map((p, i) => {
    const x = (p[1] - routePoints[0][1]) * pathScale;
    const z = -(p[0] - routePoints[0][0]) * pathScale;
    const t = i / (routePoints.length - 1);
    const alt = getAltitude(t) / 800;
    return new THREE.Vector3(x, alt, z);
  });

  // Path line
  const pathCurve = new THREE.CatmullRomCurve3(path3D);
  const pathGeo = new THREE.TubeGeometry(pathCurve, 200, 0.08, 6, false);
  const pathMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.3 });
  scene.add(new THREE.Mesh(pathGeo, pathMat));

  // Plane model
  const planeGroup = new THREE.Group();
  const planeMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee, shininess: 100 });
  const wingMat = new THREE.MeshPhongMaterial({ color: 0xdddddd });
  const engMat = new THREE.MeshPhongMaterial({ color: 0x666666 });

  // Fuselage (along Z axis = forward)
  const fuselageGeo = new THREE.CylinderGeometry(0.35, 0.25, 4, 8);
  const fuselage = new THREE.Mesh(fuselageGeo, planeMat);
  fuselage.rotation.x = Math.PI / 2;
  planeGroup.add(fuselage);

  // Nose cone
  const noseGeo = new THREE.ConeGeometry(0.35, 1, 8);
  const nose = new THREE.Mesh(noseGeo, planeMat);
  nose.rotation.x = -Math.PI / 2;
  nose.position.z = 2.5;
  planeGroup.add(nose);

  // Wings (spread along X, thin along Y)
  const wingGeo = new THREE.BoxGeometry(7, 0.1, 1.2);
  const wings = new THREE.Mesh(wingGeo, wingMat);
  wings.position.z = -0.2;
  planeGroup.add(wings);

  // Tail fin (vertical)
  const tailGeo = new THREE.BoxGeometry(0.1, 1.5, 1);
  const tail = new THREE.Mesh(tailGeo, wingMat);
  tail.position.set(0, 0.7, -2);
  planeGroup.add(tail);

  // Horizontal stabiliser
  const hStabGeo = new THREE.BoxGeometry(2.5, 0.08, 0.6);
  const hStab = new THREE.Mesh(hStabGeo, wingMat);
  hStab.position.set(0, 0, -2);
  planeGroup.add(hStab);

  // Engines (under wings)
  const engGeo = new THREE.CylinderGeometry(0.22, 0.22, 1, 8);
  const eng1 = new THREE.Mesh(engGeo, engMat);
  eng1.rotation.x = Math.PI / 2;
  eng1.position.set(-1.8, -0.3, 0.2);
  planeGroup.add(eng1);
  const eng2 = eng1.clone();
  eng2.position.set(1.8, -0.3, 0.2);
  planeGroup.add(eng2);

  scene.add(planeGroup);

  // Departure/arrival markers
  const markerGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 16);
  const depMat = new THREE.MeshPhongMaterial({ color: 0x00d2ff, emissive: 0x004466 });
  const arrMat = new THREE.MeshPhongMaterial({ color: 0x00e676, emissive: 0x004422 });
  const depMarker = new THREE.Mesh(markerGeo, depMat);
  depMarker.position.copy(path3D[0]);
  depMarker.position.y = 0.2;
  scene.add(depMarker);
  const arrMarker = new THREE.Mesh(markerGeo, arrMat);
  arrMarker.position.copy(path3D[path3D.length - 1]);
  arrMarker.position.y = 0.2;
  scene.add(arrMarker);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for (let i = 0; i < 2000; i++) {
    starVerts.push((Math.random() - 0.5) * 1600, Math.random() * 400 + 100, (Math.random() - 0.5) * 1600);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Points(starGeo, starMat));

  // Initialize camera behind start looking forward
  const startPos = pathCurve.getPointAt(0);
  const startLook = pathCurve.getPointAt(0.02);
  const startDir = new THREE.Vector3().subVectors(startLook, startPos).normalize();
  camera.position.copy(startPos).add(startDir.clone().multiplyScalar(-25));
  camera.position.y += 8;
  camera.lookAt(startPos);

  // Flight state
  let progress3D = 0;
  let throttle = 1;
  let pitchInput = 0;
  let rollInput = 0;
  let lastTime3D = null;

  const keys = {};
  const onKey = (e) => {
    if (!flight3DActive) return;
    keys[e.key.toLowerCase()] = e.type === 'keydown';
    e.preventDefault();
  };
  window.addEventListener('keydown', onKey);
  window.addEventListener('keyup', onKey);

  // Touch controls
  const hasTouchScreen = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const touchControls = document.getElementById('touch-controls');
  const joystickZone = document.getElementById('joystick-zone');
  const joystickKnob = document.getElementById('joystick-knob');
  const throttleZone = document.getElementById('throttle-zone');
  const throttleKnob = document.getElementById('throttle-knob');
  let touchPitch = 0, touchRoll = 0, touchThrottle = 1;
  let joystickTouchId = null, throttleTouchId = null;

  touchControls.style.display = 'block';
  document.getElementById('flight3d-controls').textContent = 'WASD/Arrows also work — or use the on-screen controls';

  function handleJoystick(clientX, clientY) {
    const rect = joystickZone.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    touchRoll = Math.max(-1, Math.min(1, (clientX - cx) / (rect.width / 2)));
    touchPitch = Math.max(-1, Math.min(1, -(clientY - cy) / (rect.height / 2)));
    joystickKnob.style.left = (50 + touchRoll * 35) + '%';
    joystickKnob.style.top = (50 - touchPitch * 35) + '%';
  }
  function resetJoystick() {
    touchPitch = 0; touchRoll = 0;
    joystickKnob.style.left = '50%';
    joystickKnob.style.top = '50%';
  }
  function handleThrottle(clientY) {
    const rect = throttleZone.getBoundingClientRect();
    const pct = 1 - (clientY - rect.top) / rect.height;
    touchThrottle = 0.2 + Math.max(0, Math.min(1, pct)) * 2.8;
    throttleKnob.style.bottom = (Math.max(0, Math.min(1, pct)) * 80 + 5) + '%';
  }

  // Touch events
  joystickZone.addEventListener('touchstart', (e) => { e.preventDefault(); joystickTouchId = e.changedTouches[0].identifier; });
  joystickZone.addEventListener('touchmove', (e) => { e.preventDefault(); for (const t of e.changedTouches) if (t.identifier === joystickTouchId) handleJoystick(t.clientX, t.clientY); });
  joystickZone.addEventListener('touchend', (e) => { for (const t of e.changedTouches) if (t.identifier === joystickTouchId) { joystickTouchId = null; resetJoystick(); } });
  throttleZone.addEventListener('touchstart', (e) => { e.preventDefault(); throttleTouchId = e.changedTouches[0].identifier; });
  throttleZone.addEventListener('touchmove', (e) => { e.preventDefault(); for (const t of e.changedTouches) if (t.identifier === throttleTouchId) handleThrottle(t.clientY); });
  throttleZone.addEventListener('touchend', (e) => { for (const t of e.changedTouches) if (t.identifier === throttleTouchId) throttleTouchId = null; });

  // Mouse events (desktop)
  let joystickMouseDown = false, throttleMouseDown = false;
  joystickZone.addEventListener('mousedown', (e) => { joystickMouseDown = true; handleJoystick(e.clientX, e.clientY); });
  throttleZone.addEventListener('mousedown', (e) => { throttleMouseDown = true; handleThrottle(e.clientY); });
  window.addEventListener('mousemove', (e) => {
    if (joystickMouseDown) handleJoystick(e.clientX, e.clientY);
    if (throttleMouseDown) handleThrottle(e.clientY);
  });
  window.addEventListener('mouseup', () => {
    if (joystickMouseDown) { joystickMouseDown = false; resetJoystick(); }
    throttleMouseDown = false;
  });

  // Store cleanup for proper teardown
  cleanup3D = () => {
    window.removeEventListener('keydown', onKey);
    window.removeEventListener('keyup', onKey);
    renderer.dispose();
  };

  function animate3D(now) {
    if (!flight3DActive) return;
    anim3DId = requestAnimationFrame(animate3D);

    if (lastTime3D === null) lastTime3D = now;
    const dt = Math.min((now - lastTime3D) / 1000, 0.1);
    lastTime3D = now;

    // Input (keyboard + joystick/mouse)
    if (keys['w'] || keys['arrowup']) pitchInput = Math.min(pitchInput + dt * 2, 1);
    else if (keys['s'] || keys['arrowdown']) pitchInput = Math.max(pitchInput - dt * 2, -1);
    else { pitchInput += (touchPitch - pitchInput) * 0.15; }

    if (keys['a'] || keys['arrowleft']) rollInput = Math.min(rollInput + dt * 2, 1);
    else if (keys['d'] || keys['arrowright']) rollInput = Math.max(rollInput - dt * 2, -1);
    else { rollInput += (touchRoll - rollInput) * 0.15; }

    if (keys['e']) throttle = Math.min(throttle + dt, 3);
    else if (keys['q']) throttle = Math.max(throttle - dt, 0.2);
    else throttle += (touchThrottle - throttle) * 0.1;

    // Progress along path
    progress3D = Math.min(progress3D + dt * throttle * 0.015, 1);
    const t = progress3D;

    // Get position on path
    const curvePoint = pathCurve.getPointAt(t);
    const lookAhead = pathCurve.getPointAt(Math.min(t + 0.03, 1));
    const dir = new THREE.Vector3().subVectors(lookAhead, curvePoint).normalize();
    if (dir.length() < 0.01) dir.set(0, 0, 1);

    // Position plane
    planeGroup.position.copy(curvePoint);
    planeGroup.position.y += pitchInput * 3;
    planeGroup.lookAt(lookAhead);

    // Apply roll after lookAt using quaternion multiply
    const rollQuat = new THREE.Quaternion();
    rollQuat.setFromAxisAngle(dir, -rollInput * 0.5);
    planeGroup.quaternion.multiply(rollQuat);

    // Camera chase - faster lerp for responsive feel
    const camBack = dir.clone().multiplyScalar(-20);
    camBack.y += 6;
    const camTarget = new THREE.Vector3().addVectors(planeGroup.position, camBack);
    camera.position.lerp(camTarget, 0.12);
    const lookTarget = new THREE.Vector3().addVectors(planeGroup.position, dir.clone().multiplyScalar(10));
    lookTarget.y += 0.5;
    camera.lookAt(lookTarget);

    // Move ocean/grid with plane so it's always around
    ocean.position.x = planeGroup.position.x;
    ocean.position.z = planeGroup.position.z;
    grid.position.x = planeGroup.position.x;
    grid.position.z = planeGroup.position.z;

    // HUD
    const phase = getFlightPhase(t);
    const alt = getAltitude(t);
    const spd = getSpeed(t);
    document.getElementById('hud3d-speed').textContent = Math.round(spd * throttle);
    document.getElementById('hud3d-alt').textContent = alt.toLocaleString();
    document.getElementById('hud3d-pct').textContent = Math.round(t * 100) + '%';
    document.getElementById('hud3d-phase').textContent = phase.name;

    if (t >= 1) {
      document.getElementById('hud3d-phase').textContent = 'LANDED';
      document.getElementById('hud3d-phase').style.color = '#00e676';
    }

    renderer.render(scene, camera);
  }

  anim3DId = requestAnimationFrame(animate3D);

  window.addEventListener('resize', () => {
    if (!flight3DActive) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}
</script>
</body>
</html>
